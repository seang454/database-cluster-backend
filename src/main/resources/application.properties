spring.application.name=demo

# Local PostgreSQL datasource for application tables.
spring.datasource.url=jdbc:postgresql://localhost:5432/db-cluster
spring.datasource.username=postgres
spring.datasource.password=seang0405
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Kubernetes client configuration.
# KUBECONFIG uses kubernetes.client.kubeconfig-path.
kubernetes.client.mode=KUBECONFIG
kubernetes.client.kubeconfig-path=C:/Users/M/.kube/config
kubernetes.client.connect-timeout=PT10S
kubernetes.client.read-timeout=PT30S
# Set these to true if your API server certificate does not include the host you connect to.
# That is common when you reach the cluster by IP instead of a DNS name in the certificate SANs.
kubernetes.client.trust-certificates=false
kubernetes.client.disable-hostname-verification=false
cluster.deployment.default-release-prefix=db
cluster.deployment.default-namespace-prefix=ns
# Helm chart deployment settings.
# Use the repo-managed chart defaults file so local runs match the checked-in Helm values.
cluster.deployment.defaults-file=helm/values.yaml
cluster.deployment.chart-path=oci://ghcr.io/seang454/db-cluster
cluster.deployment.chart-version=4.0.2
cluster.deployment.helm-executable=helm
cluster.deployment.helm-timeout=30m
cluster.deployment.minio-endpoint-url=http://my-minio-minio.storage.svc:9000
cluster.deployment.minio-bucket-timeout=2m
cluster.deployment.minio-credentials-namespace=storage
cluster.deployment.minio-credentials-secret-prefix=minio-credentials
cluster.deployment.minio-credentials-access-key=root-user
cluster.deployment.minio-credentials-secret-key=root-password

# cloudflare configuration
cluster.deployment.default-cluster-domain=seang.shop
cluster.deployment.default-external-ip=136.107.243.180
cluster.deployment.default-cloudflare-enabled=true
cluster.deployment.default-cloudflare-zone-name=seang.shop
cluster.deployment.default-cloudflare-zone-id=
# Fallback Cloudflare API token used when the request does not include one.
cluster.deployment.default-cloudflare-api-token=${CLOUDFLARE_API_TOKEN:}

# Frontend access for a separate Next.js app.
frontend.cors.allowed-origins[0]=http://localhost:3000
